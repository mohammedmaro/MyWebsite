<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#311042" />
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGrad)" rx="16" />

  <!-- Abstract grid patterns -->
  <circle cx="300" cy="200" r="180" fill="none" stroke="#818cf8" stroke-width="0.5" opacity="0.1" />
  <circle cx="300" cy="200" r="120" fill="none" stroke="#818cf8" stroke-width="0.5" opacity="0.15" />
  
  <!-- Title Graphic -->
  <text x="50" y="70" fill="#ffffff" font-family="system-ui, sans-serif" font-size="28" font-weight="800" letter-spacing="1">PSYCHE ANALYZER</text>
  <text x="50" y="100" fill="#c084fc" font-family="system-ui, sans-serif" font-size="16" font-weight="600" letter-spacing="0.5">تطبيق تحليل الشخصية وتصنيفها</text>

  <!-- UI Window Container -->
  <rect x="50" y="140" width="500" height="210" rx="12" fill="#0f0b24" fill-opacity="0.8" stroke="#a78bfa" stroke-width="1.5" />
  
  <!-- Browser top bar -->
  <path d="M50 140 H 550 V 165 H 50 Z" fill="#1e1548" rx="2" />
  <circle cx="70" cy="152" r="5" fill="#ef4444" />
  <circle cx="85" cy="152" r="5" fill="#eab308" />
  <circle cx="100" cy="152" r="5" fill="#22c55e" />
  
  <!-- Content: Left side (MBTI types indicators) -->
  <g transform="translate(80, 185)">
    <text x="0" y="15" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="13" font-weight="bold">PERSONALITY SPECTRUM</text>
    
    <!-- Progress Bar 1 -->
    <text x="0" y="40" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">Introvert (I) vs Extrovert (E)</text>
    <rect x="0" y="47" width="180" height="8" rx="4" fill="#1e293b" />
    <rect x="0" y="47" width="130" height="8" rx="4" fill="url(#primaryGrad)" />
    <text x="190" y="55" fill="#c084fc" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">72% I</text>

    <!-- Progress Bar 2 -->
    <text x="0" y="75" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">Intuition (N) vs Sensing (S)</text>
    <rect x="0" y="82" width="180" height="8" rx="4" fill="#1e293b" />
    <rect x="0" y="82" width="150" height="8" rx="4" fill="url(#primaryGrad)" />
    <text x="190" y="90" fill="#c084fc" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">83% N</text>

    <!-- Progress Bar 3 -->
    <text x="0" y="110" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">Thinking (T) vs Feeling (F)</text>
    <rect x="0" y="117" width="180" height="8" rx="4" fill="#1e293b" />
    <rect x="0" y="117" width="105" height="8" rx="4" fill="url(#primaryGrad)" />
    <text x="190" y="125" fill="#c084fc" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">58% T</text>
  </g>

  <!-- Right side (Brain and constellation graph) -->
  <g transform="translate(420, 245)" filter="url(#glow)">
    <circle cx="0" cy="0" r="45" fill="none" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="3 3" />
    <!-- Glowing Network / Nodes of brain representation -->
    <path d="M-25 -20 L-10 -35 L20 -30 L35 -10 L25 25 L-5 35 L-30 15 Z" fill="none" stroke="#c084fc" stroke-width="2" />
    <line x1="0" y1="0" x2="-25" y2="-20" stroke="#818cf8" stroke-width="1" />
    <line x1="0" y1="0" x2="-10" y2="-35" stroke="#818cf8" stroke-width="1" />
    <line x1="0" y1="0" x2="20" y2="-30" stroke="#818cf8" stroke-width="1" />
    <line x1="0" y1="0" x2="35" y2="-10" stroke="#818cf8" stroke-width="1" />
    <line x1="0" y1="0" x2="25" y2="25" stroke="#818cf8" stroke-width="1" />
    <line x1="0" y1="0" x2="-5" y2="35" stroke="#818cf8" stroke-width="1" />
    <line x1="0" y1="0" x2="-30" y2="15" stroke="#818cf8" stroke-width="1" />

    <circle cx="0" cy="0" r="5" fill="#ffffff" />
    <circle cx="-25" cy="-20" r="4" fill="#a78bfa" />
    <circle cx="-10" cy="-35" r="4" fill="#a78bfa" />
    <circle cx="20" cy="-30" r="4" fill="#818cf8" />
    <circle cx="35" cy="-10" r="4" fill="#a78bfa" />
    <circle cx="25" cy="25" r="4" fill="#818cf8" />
    <circle cx="-5" cy="35" r="4" fill="#818cf8" />
    <circle cx="-30" cy="15" r="4" fill="#a78bfa" />
    
    <text x="0" y="62" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="800" text-anchor="middle">INTJ-A</text>
  </g>
</svg>
