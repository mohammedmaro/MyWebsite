<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#451a03" />
      <stop offset="100%" stop-color="#1c1917" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="100%" stop-color="#facc15" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGrad)" rx="16" />
  
  <!-- Grid overlay -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.05">
    <line x1="50" y1="0" x2="50" y2="400" />
    <line x1="150" y1="0" x2="150" y2="400" />
    <line x1="250" y1="0" x2="250" y2="400" />
    <line x1="350" y1="0" x2="350" y2="400" />
    <line x1="450" y1="0" x2="450" y2="400" />
    <line x1="550" y1="0" x2="550" y2="400" />
    
    <line x1="0" y1="50" x2="600" y2="50" />
    <line x1="0" y1="150" x2="600" y2="150" />
    <line x1="0" y1="250" x2="600" y2="250" />
    <line x1="0" y1="350" x2="600" y2="350" />
  </g>

  <!-- Title Graphic -->
  <text x="50" y="70" fill="#ffffff" font-family="system-ui, sans-serif" font-size="28" font-weight="800" letter-spacing="1">DINE CONTROL</text>
  <text x="50" y="100" fill="#f97316" font-family="system-ui, sans-serif" font-size="16" font-weight="600" letter-spacing="0.5">نظام حاسوبي لإدارة المطاعم</text>

  <!-- Dashboard Frame -->
  <rect x="50" y="140" width="500" height="210" rx="12" fill="#0c0a09" fill-opacity="0.8" stroke="#ea580c" stroke-width="2" filter="url(#shadow)" />
  
  <!-- Browser top bar -->
  <path d="M50 140 H 550 V 165 H 50 Z" fill="#1c1917" />
  <circle cx="70" cy="152" r="5" fill="#ef4444" />
  <circle cx="85" cy="152" r="5" fill="#f59e0b" />
  <circle cx="100" cy="152" r="5" fill="#22c55e" />
  <rect x="130" y="147" width="340" height="10" rx="5" fill="#0c0a09" opacity="0.5" />
  
  <!-- Order Cards Grid -->
  <!-- Card 1 -->
  <rect x="75" y="185" width="135" height="135" rx="8" fill="#1c1917" stroke="#ea580c" stroke-width="1" />
  <rect x="75" y="185" width="135" height="25" rx="8" fill="#ea580c" />
  <text x="85" y="202" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">Table 04 - Order #102</text>
  <text x="85" y="230" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" opacity="0.9">- 2x Double Beef Burger</text>
  <text x="85" y="245" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" opacity="0.9">- 1x Crispy French Fries</text>
  <text x="85" y="260" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" opacity="0.9">- 2x Cola Drink</text>
  <rect x="85" y="288" width="55" height="18" rx="4" fill="#22c55e" />
  <text x="92" y="301" fill="#ffffff" font-family="system-ui, sans-serif" font-weight="bold" font-size="9">Cooking</text>
  
  <!-- Card 2 -->
  <rect x="225" y="185" width="135" height="135" rx="8" fill="#1c1917" stroke="#292524" stroke-width="1" />
  <rect x="225" y="185" width="135" height="25" rx="8" fill="#292524" />
  <text x="235" y="202" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="bold">Table 11 - Order #103</text>
  <text x="235" y="230" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" opacity="0.9">- 1x Pepperoni Pizza Large</text>
  <text x="235" y="245" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" opacity="0.9">- 1x Caesar Salad</text>
  <text x="235" y="275" width="55" height="18" rx="4" fill="#a8a29e" />
  <rect x="235" y="288" width="55" height="18" rx="4" fill="#eab308" />
  <text x="245" y="301" fill="#1c1917" font-family="system-ui, sans-serif" font-weight="bold" font-size="9">Pending</text>

  <!-- Right side: Revenue & Tables Status -->
  <rect x="375" y="185" width="150" height="55" rx="6" fill="#1c1917" />
  <text x="385" y="205" fill="#a8a29e" font-family="system-ui, sans-serif" font-size="10">TODAY'S SALES</text>
  <text x="385" y="228" fill="url(#yellowGrad)" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">$4,852.50</text>

  <!-- Circle Representation for Table Capacities -->
  <rect x="375" y="250" width="150" height="70" rx="6" fill="#1c1917" />
  <text x="385" y="268" fill="#a8a29e" font-family="system-ui, sans-serif" font-size="10">TABLE STATUS</text>
  <!-- Table circles -->
  <circle cx="395" cy="295" r="12" fill="#22c55e" />
  <text x="395" y="298" fill="#ffffff" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">T1</text>
  <circle cx="425" cy="295" r="12" fill="#ef4444" />
  <text x="425" y="298" fill="#ffffff" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">T2</text>
  <circle cx="455" cy="295" r="12" fill="#ef4444" />
  <text x="455" y="298" fill="#ffffff" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">T3</text>
  <circle cx="485" cy="295" r="12" fill="#22c55e" />
  <text x="485" y="298" fill="#ffffff" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">T4</text>
</svg>
