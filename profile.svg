<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background circle with dark theme styling -->
  <circle cx="250" cy="250" r="230" fill="url(#bgGrad)" stroke="url(#accentGrad)" stroke-width="6" />

  <!-- Decorative network nodes / constellations (representing IT Support & Networks) -->
  <g opacity="0.3">
    <line x1="150" y1="150" x2="250" y2="100" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4 4" />
    <line x1="250" y1="100" x2="350" y2="150" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4 4" />
    <line x1="350" y1="150" x2="380" y2="280" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4 4" />
    <line x1="380" y1="280" x2="250" y2="380" stroke="#3b82f6" stroke-width="1.5" />
    <line x1="250" y1="380" x2="120" y2="280" stroke="#3b82f6" stroke-width="1.5" />
    <line x1="120" y1="280" x2="150" y2="150" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4 4" />
    
    <circle cx="150" cy="150" r="6" fill="#10b981" />
    <circle cx="250" cy="100" r="8" fill="#fbbf24" />
    <circle cx="350" cy="150" r="6" fill="#3b82f6" />
    <circle cx="380" cy="280" r="7" fill="#10b981" />
    <circle cx="120" cy="280" r="7" fill="#f59e0b" />
  </g>

  <!-- Coding elements in background -->
  <g opacity="0.15">
    <text x="70" y="200" fill="#3b82f6" font-family="monospace" font-size="18">&lt;code&gt;</text>
    <text x="70" y="230" fill="#10b981" font-family="monospace" font-size="14">const dev = new Developer();</text>
    <text x="70" y="250" fill="#10b981" font-family="monospace" font-size="14">dev.solve(problems);</text>
    <text x="70" y="280" fill="#3b82f6" font-family="monospace" font-size="18">&lt;/code&gt;</text>
    
    <text x="340" y="200" fill="#fbbf24" font-family="monospace" font-size="16">IP: 192.168.88.1</text>
    <text x="340" y="225" fill="#3b82f6" font-family="monospace" font-size="14">MikroTik RouterOS</text>
    <text x="340" y="250" fill="#10b981" font-family="monospace" font-size="14">Status: SECURE</text>
  </g>

  <!-- Main Tech / Developer Avatar Base -->
  <!-- Floating rings -->
  <circle cx="250" cy="250" r="180" fill="none" stroke="#10b981" stroke-width="1" stroke-dasharray="8 8" opacity="0.4" />
  <circle cx="250" cy="250" r="200" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="15 5" opacity="0.3" />

  <!-- Glassmorphic Laptop Representation -->
  <rect x="140" y="320" width="220" height="130" rx="10" fill="#1e293b" fill-opacity="0.6" stroke="url(#accentGrad)" stroke-width="3" filter="url(#glow)" />
  <!-- Screen divider & code mock -->
  <line x1="140" y1="335" x2="360" y2="335" stroke="#334155" stroke-width="2" />
  <circle cx="155" cy="327" r="4" fill="#ef4444" />
  <circle cx="167" cy="327" r="4" fill="#eab308" />
  <circle cx="179" cy="327" r="4" fill="#22c55e" />
  
  <rect x="160" y="350" width="80" height="8" rx="4" fill="#3b82f6" opacity="0.7" />
  <rect x="160" y="365" width="140" height="8" rx="4" fill="#10b981" opacity="0.7" />
  <rect x="160" y="380" width="110" height="8" rx="4" fill="#f59e0b" opacity="0.7" />
  <rect x="160" y="395" width="160" height="8" rx="4" fill="#64748b" opacity="0.5" />
  <circle cx="320" cy="365" r="15" fill="none" stroke="#3b82f6" stroke-width="3" stroke-dasharray="6 3" />
  <circle cx="320" cy="365" r="5" fill="#3b82f6" />

  <!-- Avatar silhouette representing Mohammed -->
  <g>
    <!-- Shoulders -->
    <path d="M170 320 C170 280, 200 250, 250 250 C300 250, 330 280, 330 320 Z" fill="url(#avatarGrad)" />
    <!-- Neck -->
    <rect x="235" y="215" width="30" height="40" rx="5" fill="#f8fafc" opacity="0.9" />
    <!-- Head -->
    <circle cx="250" cy="185" r="40" fill="#f8fafc" />
    <!-- Hair / Professional styling representation -->
    <path d="M210 185 C210 145, 290 145, 290 185 C290 160, 210 160, 210 185 Z" fill="#1e293b" />
    <!-- Glasses for professional IT look -->
    <rect x="225" y="180" width="22" height="12" rx="3" fill="none" stroke="#1e293b" stroke-width="2.5" />
    <rect x="253" y="180" width="22" height="12" rx="3" fill="none" stroke="#1e293b" stroke-width="2.5" />
    <line x1="247" y1="186" x2="253" y2="186" stroke="#1e293b" stroke-width="2.5" />
    <!-- Friendly smile -->
    <path d="M242 205 Q250 212 258 205" fill="none" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round" />
  </g>

  <!-- Hovering Tech Icons (React, Database, Networks) -->
  <!-- Left Side: Web Dev & Databases -->
  <g transform="translate(100, 100) scale(0.8)">
    <circle cx="0" cy="0" r="30" fill="#1e293b" fill-opacity="0.8" stroke="#10b981" stroke-width="2" />
    <!-- DB Icon (Cylinder) -->
    <ellipse cx="0" cy="-8" rx="14" ry="5" fill="none" stroke="#10b981" stroke-width="2" />
    <path d="M-14 -8 V0 A14 5 0 0 0 14 0 V-8" fill="none" stroke="#10b981" stroke-width="2" />
    <path d="M-14 0 V8 A14 5 0 0 0 14 8 V0" fill="none" stroke="#10b981" stroke-width="2" />
  </g>

  <!-- Right Side: Networks & IT Support -->
  <g transform="translate(400, 100) scale(0.8)">
    <circle cx="0" cy="0" r="30" fill="#1e293b" fill-opacity="0.8" stroke="#f59e0b" stroke-width="2" />
    <!-- Router/Wifi Icon -->
    <path d="M-15 10 A18 18 0 0 1 15 10" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" />
    <path d="M-10 5 A12 12 0 0 1 10 5" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" />
    <path d="M-5 0 A6 6 0 0 1 5 0" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" />
    <circle cx="0" cy="-6" r="2.5" fill="#f59e0b" />
  </g>

  <!-- Center-Bottom: Gear for Support/Troubleshooting -->
  <g transform="translate(250, 435) scale(0.7)" filter="url(#glow)">
    <circle cx="0" cy="0" r="20" fill="url(#goldGrad)" />
    <!-- Gear teeth -->
    <path d="M-5 -25 L5 -25 L8 -18 L18 -18 L21 -8 L25 -5 L25 5 L21 8 L18 18 L8 18 L5 25 L-5 25 L-8 18 L-18 18 L-21 8 L-25 5 L-25 -5 L-21 -8 L-18 -18 L-8 -18 Z" fill="url(#goldGrad)" />
    <circle cx="0" cy="0" r="8" fill="#1e293b" />
  </g>
</svg>
