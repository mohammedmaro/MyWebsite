<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#083344" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="blueCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGrad)" rx="16" />

  <!-- Wave lines overlay representing cash flow -->
  <path d="M 0 320 Q 150 250 300 300 T 600 240 L 600 400 L 0 400 Z" fill="#0891b2" fill-opacity="0.05" />
  <path d="M 0 350 Q 120 280 280 340 T 600 280 L 600 400 L 0 400 Z" fill="#0e7490" fill-opacity="0.08" />

  <!-- Title Graphic -->
  <text x="50" y="70" fill="#ffffff" font-family="system-ui, sans-serif" font-size="28" font-weight="800" letter-spacing="1">EXPENSE TRACKER</text>
  <text x="50" y="100" fill="#06b6d4" font-family="system-ui, sans-serif" font-size="16" font-weight="600" letter-spacing="0.5">تطبيق إدارة المصروف اليومي والتحليلات</text>

  <!-- Dashboard Frame -->
  <rect x="50" y="140" width="500" height="210" rx="12" fill="#020617" fill-opacity="0.8" stroke="#0891b2" stroke-width="1.5" />
  
  <!-- Browser top bar -->
  <path d="M50 140 H 550 V 165 H 50 Z" fill="#0f172a" />
  <circle cx="70" cy="152" r="5" fill="#ef4444" />
  <circle cx="85" cy="152" r="5" fill="#eab308" />
  <circle cx="100" cy="152" r="5" fill="#22c55e" />
  
  <!-- Visuals: Credit Card representation on left -->
  <rect x="75" y="185" width="180" height="110" rx="8" fill="url(#cardGrad)" />
  <circle cx="220" cy="210" r="15" fill="#ffffff" fill-opacity="0.2" />
  <circle cx="232" cy="210" r="15" fill="#ffffff" fill-opacity="0.3" />
  <text x="95" y="275" fill="#ffffff" font-family="monospace" font-size="12" letter-spacing="1">**** **** **** 8844</text>
  <text x="95" y="220" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" opacity="0.6">Balance</text>
  <text x="95" y="242" fill="#ffffff" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">$2,450.00</text>

  <!-- Statistics bars & list on right -->
  <g transform="translate(280, 185)">
    <text x="0" y="12" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">MONTHLY BUDGET SPENT</text>
    <text x="0" y="32" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">$620 / $1,000</text>
    
    <rect x="0" y="42" width="240" height="10" rx="5" fill="#1e293b" />
    <rect x="0" y="42" width="148" height="10" rx="5" fill="url(#blueCyan)" />
    
    <!-- Transaction list -->
    <text x="0" y="75" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">RECENT TRANSACTIONS</text>
    
    <g transform="translate(0, 85)">
      <!-- Item 1 -->
      <circle cx="10" cy="10" r="10" fill="#ef4444" fill-opacity="0.2" />
      <text x="10" y="14" fill="#ef4444" font-family="system-ui, sans-serif" font-weight="bold" font-size="10" text-anchor="middle">F</text>
      <text x="30" y="14" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11">Grocery Shopping</text>
      <text x="240" y="14" fill="#ef4444" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="end">-$52.50</text>
      
      <!-- Item 2 -->
      <g transform="translate(0, 25)">
        <circle cx="10" cy="10" r="10" fill="#22c55e" fill-opacity="0.2" />
        <text x="10" y="14" fill="#22c55e" font-family="system-ui, sans-serif" font-weight="bold" font-size="10" text-anchor="middle">S</text>
        <text x="30" y="14" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11">Salary Received</text>
        <text x="240" y="14" fill="#22c55e" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="end">+$1,500.00</text>
      </g>
    </g>
  </g>
</svg>
